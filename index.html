<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💖 爱心提示</title>
<style>
  :root {
    --card-w: 120px;
    --card-h: 52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: linear-gradient(135deg, #1a0a1e 0%, #2d1540 25%, #1e0a2e 50%, #3d1a4a 75%, #1a0a1e 100%);
    background-size: 400% 400%;
    animation: bgShift 20s ease-in-out infinite;
    font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    25% { background-position: 100% 0%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }
  }

  /* 光晕装饰 */
  .glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #ff6b9d 0%, transparent 70%);
    top: -5%; left: -10%;
    animation: glowFloat1 8s ease-in-out infinite;
  }
  .glow-2 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #c084fc 0%, transparent 70%);
    bottom: -8%; right: -8%;
    animation: glowFloat2 10s ease-in-out infinite;
  }
  .glow-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #f9a8d4 0%, transparent 70%);
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    animation: glowFloat3 12s ease-in-out infinite;
  }

  @keyframes glowFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(60px, 40px) scale(1.15); }
    66% { transform: translate(-30px, 20px) scale(0.9); }
  }
  @keyframes glowFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-50px, -30px) scale(1.1); }
    66% { transform: translate(20px, -50px) scale(0.85); }
  }
  @keyframes glowFloat3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.3); }
  }

  /* 卡片层 */
  #cards-layer {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .card {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 600;
    color: #333;
    letter-spacing: 0.5px;
    box-shadow:
      0 4px 20px rgba(255, 107, 157, 0.3),
      0 1px 4px rgba(0, 0, 0, 0.1),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    border: 1.5px solid rgba(255, 255, 255, 0.45);
    opacity: 0;
    transform: scale(0);
    transition: none;
    will-change: transform, opacity;
  }

  .card.visible {
    animation: cardPopIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  .card.breathing {
    animation: cardBreathe 4s ease-in-out infinite;
  }

  .card.fading-out {
    animation: cardFadeOut 1s ease-in forwards;
  }

  @keyframes cardPopIn {
    0% { opacity: 0; transform: scale(0) rotate(-15deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  @keyframes cardBreathe {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-5px) scale(1.04); }
  }

  @keyframes cardFadeOut {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.1) rotate(5deg); }
    100% { opacity: 0; transform: scale(0.3) rotate(15deg); }
  }

  /* 花瓣画布 */
  #petals-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* 标题 */
  .title-area {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    pointer-events: none;
    text-align: center;
  }
  .title-text {
    font-size: clamp(20px, 4vw, 28px);
    color: rgba(255, 255, 255, 0.85);
    text-shadow: 0 0 30px rgba(255, 107, 157, 0.6);
    letter-spacing: 2px;
  }
  .title-emoji {
    font-size: clamp(24px, 5vw, 36px);
    animation: emojiBounce 1.5s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes emojiBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* 重播按钮 */
  .replay-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    padding: 14px 36px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: 1px;
    color: #fff;
    background: linear-gradient(135deg, #ff6b9d 0%, #c084fc 100%);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow:
      0 6px 30px rgba(255, 107, 157, 0.45),
      0 2px 8px rgba(192, 132, 252, 0.3);
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
    transition: opacity 0.5s, transform 0.5s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .replay-btn.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .replay-btn:active {
    transform: translateX(-50%) translateY(0) scale(0.94);
    box-shadow: 0 3px 15px rgba(255, 107, 157, 0.3);
  }
  .replay-btn .btn-emoji {
    margin-right: 6px;
  }

  /* 阶段提示 */
  .phase-hint {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    pointer-events: none;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.8s;
  }
  .phase-hint.show {
    opacity: 1;
  }
</style>
</head>
<body>

  <!-- 背景光晕 -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>

  <!-- 花瓣粒子 -->
  <canvas id="petals-canvas"></canvas>

  <!-- 卡片容器 -->
  <div id="cards-layer"></div>

  <!-- 标题 -->
  <div class="title-area">
    <span class="title-emoji">💖</span>
    <div class="title-text">小提示</div>
  </div>

  <!-- 阶段提示 -->
  <div class="phase-hint" id="phase-hint"></div>

  <!-- 背景音乐 -->
  <audio id="bg-music" src="Again.mp3" preload="auto"></audio>

  <!-- 重播按钮 -->
  <button class="replay-btn" id="replay-btn">
    <span class="btn-emoji">🔄</span>再看一次
  </button>

<script>
(function() {
  // ============ 配置 ============
  const TIPS = [
    "多喝热水", "好好爱自己", "好好吃饭", "保持好心情",
    "我想你了", "顺顺利利", "别熬夜", "天凉了多穿衣服",
    "要开心哦", "你最棒了", "记得微笑", "累了就休息",
    "你很特别", "明天会更好", "加油呀", "永远爱你"
  ];

  const COLORS = [
    "#ffb3c6", // pink
    "#b3d9ff", // lightblue
    "#b3f0c6", // lightgreen
    "#fff5ba", // lemonchiffon
    "#ff6b9d", // hotpink
    "#87ceeb", // skyblue
    "#ffd1dc", // light pink
    "#c4b5fd", // light purple
  ];

  const TOTAL_CARDS = 100;
  const EXTRA_RANDOM_CARDS = 60;

  // ============ DOM 引用 ============
  const cardsLayer = document.getElementById('cards-layer');
  const petalsCanvas = document.getElementById('petals-canvas');
  const ctx = petalsCanvas.getContext('2d');
  const replayBtn = document.getElementById('replay-btn');
  const phaseHint = document.getElementById('phase-hint');
  const bgMusic = document.getElementById('bg-music');

  // ============ 状态 ============
  let heartCards = [];     // 心形卡片元素
  let randomCards = [];    // 随机散落卡片元素
  let animationRunning = false;
  let cancelFlag = false;

  // ============ 画布尺寸适配 ============
  function resizeCanvas() {
    petalsCanvas.width = window.innerWidth;
    petalsCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ============ 心形参数方程 ============
  function heartPoint(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    return { x, y };
  }

  function getHeartPositions(n) {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const positions = [];
    const scaleX = Math.min(w / 600, h / 500) * 18;
    const scaleY = scaleX;
    const cx = w / 2;
    const cy = h / 2 - 30;

    for (let i = 0; i < n; i++) {
      const th = (i / n) * 2 * Math.PI;
      const { x, y } = heartPoint(th);
      const sx = cx + x * scaleX - 60;  // 60 = card-w / 2
      const sy = cy - y * scaleY - 26;   // 26 = card-h / 2
      positions.push({
        x: Math.max(10, Math.min(sx, w - 130)),
        y: Math.max(10, Math.min(sy, h - 62)),
      });
    }
    return positions;
  }

  // ============ 创建卡片 ============
  function createCard(text, color, x, y) {
    const card = document.createElement('div');
    card.className = 'card';
    card.textContent = text;
    card.style.left = x + 'px';
    card.style.top = y + 'px';
    card.style.background = `linear-gradient(145deg, ${color} 0%, ${adjustColor(color, -15)} 100%)`;
    return card;
  }

  function adjustColor(hex, amount) {
    const r = Math.max(0, Math.min(255, parseInt(hex.slice(1, 3), 16) + amount));
    const g = Math.max(0, Math.min(255, parseInt(hex.slice(3, 5), 16) + amount));
    const b = Math.max(0, Math.min(255, parseInt(hex.slice(5, 7), 16) + amount));
    return `rgb(${r},${g},${b})`;
  }

  function rand(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ============ 花瓣粒子系统 ============
  let petals = [];

  function initPetals() {
    petals = [];
    const count = 60;
    for (let i = 0; i < count; i++) {
      petals.push({
        x: Math.random() * petalsCanvas.width,
        y: Math.random() * petalsCanvas.height,
        size: 4 + Math.random() * 10,
        speed: 0.3 + Math.random() * 1.2,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.005 + Math.random() * 0.02,
        opacity: 0.2 + Math.random() * 0.45,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.02,
        type: Math.random() < 0.3 ? 'heart' : 'petal',
        // 花瓣形状用贝塞尔控制点偏移
        hue: 330 + Math.random() * 40, // 粉紫色系
      });
    }
  }

  function drawPetalShape(x, y, size, rotation, opacity, hue) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.globalAlpha = opacity * 0.7;
    ctx.fillStyle = `hsla(${hue}, 70%, 70%, ${opacity})`;
    ctx.beginPath();
    // 简单花瓣形状
    ctx.ellipse(0, -size * 0.2, size * 0.35, size * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, size * 0.2, size * 0.35, size * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHeartShape(x, y, size, rotation, opacity, hue) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.globalAlpha = opacity * 0.8;
    ctx.fillStyle = `hsla(${hue}, 80%, 65%, ${opacity})`;
    const s = size * 0.08;
    ctx.beginPath();
    // Mini heart using the parametric equation
    for (let i = 0; i <= 100; i++) {
      const t = (i / 100) * Math.PI * 2;
      const hx = 16 * Math.pow(Math.sin(t), 3) * s;
      const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * s;
      if (i === 0) ctx.moveTo(hx, hy);
      else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function animatePetals() {
    ctx.clearRect(0, 0, petalsCanvas.width, petalsCanvas.height);

    for (const p of petals) {
      p.y += p.speed;
      p.wobble += p.wobbleSpeed;
      p.x += Math.sin(p.wobble) * 0.4;
      p.rotation += p.rotSpeed;

      if (p.y > petalsCanvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * petalsCanvas.width;
      }
      if (p.x < -20) p.x = petalsCanvas.width + 20;
      if (p.x > petalsCanvas.width + 20) p.x = -20;

      if (p.type === 'heart') {
        drawHeartShape(p.x, p.y, p.size, p.rotation, p.opacity, p.hue);
      } else {
        drawPetalShape(p.x, p.y, p.size, p.rotation, p.opacity, p.hue);
      }
    }

    if (!cancelFlag) {
      requestAnimationFrame(animatePetals);
    }
  }

  // ============ 主流程 ============
  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function clearAllCards() {
    cardsLayer.innerHTML = '';
    heartCards = [];
    randomCards = [];
  }

  function showHint(text) {
    phaseHint.textContent = text;
    phaseHint.classList.add('show');
  }

  function hideHint() {
    phaseHint.classList.remove('show');
  }

  function showReplayBtn() {
    replayBtn.classList.add('show');
  }

  function hideReplayBtn() {
    replayBtn.classList.remove('show');
  }

  async function runAnimation() {
    if (animationRunning) return;
    animationRunning = true;
    cancelFlag = false;

    hideReplayBtn();
    hideHint();
    clearAllCards();
    initPetals();
    resizeCanvas();

    // 启动花瓣动画（如果还没跑）
    if (!window._petalsRunning) {
      window._petalsRunning = true;
      animatePetals();
    }

    const w = window.innerWidth;
    const h = window.innerHeight;
    const positions = getHeartPositions(TOTAL_CARDS);

    // ====== 阶段 1: 心形逐个出现 (10s) ======
    showHint('✨ 爱心正在生成...');
    for (let i = 0; i < TOTAL_CARDS; i++) {
      if (cancelFlag) break;
      const pos = positions[i];
      const tip = i === TOTAL_CARDS - 1 ? "充实自己" : rand(TIPS);
      const color = rand(COLORS);
      const card = createCard(tip, color, pos.x, pos.y);
      cardsLayer.appendChild(card);
      heartCards.push(card);

      requestAnimationFrame(() => {
        card.classList.add('visible');
      });

      await sleep(100);
    }

    if (cancelFlag) { finish(); return; }

    // ====== 阶段 2: 心形保持 + 呼吸动画 (8s) ======
    hideHint();
    heartCards.forEach(c => c.classList.add('breathing'));
    await sleep(8000);

    if (cancelFlag) { finish(); return; }

    // ====== 阶段 3a: 心形卡片散开 (~2s) ======
    showHint('💫 散落中...');
    heartCards.forEach(c => c.classList.remove('breathing'));

    for (const card of heartCards) {
      if (cancelFlag) break;
      const nx = Math.random() * (w - 130);
      const ny = Math.random() * (h - 62);
      card.style.transition = 'left 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), top 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      card.style.left = nx + 'px';
      card.style.top = ny + 'px';
      await sleep(15);
    }

    if (cancelFlag) { finish(); return; }

    // ====== 阶段 3b: 额外随机卡片出现 (~2.5s) ======
    showHint('🌸 到处都是...');
    const extraCount = Math.floor(w / 150) * Math.floor(h / 40) + 50;
    for (let i = 0; i < Math.min(extraCount, 120); i++) {
      if (cancelFlag) break;
      const x = Math.random() * (w - 130);
      const y = Math.random() * (h - 62);
      const tip = rand(TIPS);
      const color = rand(COLORS);
      const card = createCard(tip, color, x, y);
      cardsLayer.appendChild(card);
      randomCards.push(card);

      requestAnimationFrame(() => {
        card.classList.add('visible');
      });

      await sleep(25);
    }

    if (cancelFlag) { finish(); return; }

    // ====== 阶段 3c: 所有卡片停留 (~26s，与音乐同步) ======
    showHint('💝 要一直幸福哦 ~');
    await sleep(26000);

    if (cancelFlag) { finish(); return; }

    // ====== 阶段 3d: 所有卡片逐个消失 (~10s) ======
    hideHint();
    const allCards = [...heartCards, ...randomCards];
    for (let i = allCards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
    }

    const totalTime = 10000;
    const interval = totalTime / allCards.length;

    for (const card of allCards) {
      if (cancelFlag) break;
      if (card.parentNode) {
        card.style.transition = '';
        card.classList.add('fading-out');
      }
      await sleep(interval);
    }

    finish();
  }

  function finish() {
    animationRunning = false;
    cancelFlag = false;
    hideHint();
    clearAllCards();
    showReplayBtn();
    // 音乐播放完毕后自然停止
    bgMusic.pause();
    bgMusic.currentTime = 0;
  }

  function cancelAndReplay() {
    if (animationRunning) {
      cancelFlag = true;
      setTimeout(() => {
        clearAllCards();
        hideHint();
        hideReplayBtn();
        animationRunning = false;
        cancelFlag = false;
        runAnimation();
      }, 300);
    } else {
      runAnimation();
    }
  }

  // ============ 事件监听 ============
  replayBtn.addEventListener('click', (e) => {
    e.preventDefault();
    // 在用户点击的同步上下文中启动音乐（满足浏览器自动播放策略）
    bgMusic.currentTime = 0;
    bgMusic.play().catch(err => console.log('音乐播放失败:', err));
    cancelAndReplay();
  });

  // 空格键也可以重播
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      bgMusic.currentTime = 0;
      bgMusic.play().catch(err => console.log('音乐播放失败:', err));
      cancelAndReplay();
    }
  });

  // ============ 启动 ============
  initPetals();
  window._petalsRunning = true;
  animatePetals();
  showReplayBtn();

  // 首次需要用户点击按钮来启动（这样浏览器才会允许播放音乐）
  // 如果想自动播放（无音乐），取消下面这行的注释：
  // setTimeout(() => runAnimation(), 500);

})();
</script>
</body>
</html>
